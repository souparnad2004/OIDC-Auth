<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>OIDC Client Registration</title>

  <style>
    body {
      margin: 0;
      font-family: system-ui, sans-serif;
      background: #0b1220;
      color: #e2e8f0;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
    }

    .card {
      width: 450px;
      background: #111827;
      padding: 24px;
      border-radius: 14px;
      box-shadow: 0 15px 40px rgba(0,0,0,0.5);
    }

    h2 {
      text-align: center;
      margin-bottom: 20px;
    }

    label {
      font-size: 13px;
      color: #94a3b8;
      display: block;
      margin-top: 10px;
    }

    input, textarea {
      width: 100%;
      padding: 10px;
      margin-top: 6px;
      border-radius: 8px;
      border: 1px solid #334155;
      background: #0f172a;
      color: white;
      outline: none;
    }

    input:focus, textarea:focus {
      border-color: #3b82f6;
    }

    .row {
      margin-top: 10px;
      display: flex;
      align-items: center;
      gap: 8px;
      font-size: 13px;
      color: #94a3b8;
    }

    button {
      width: 100%;
      margin-top: 18px;
      padding: 10px;
      border: none;
      border-radius: 8px;
      background: #2563eb;
      color: white;
      font-weight: 600;
      cursor: pointer;
    }

    button:hover {
      background: #1d4ed8;
    }

    .result {
      margin-top: 15px;
      padding: 12px;
      background: #0b1020;
      border-radius: 8px;
      border: 1px solid #1f2937;
      font-size: 13px;
      white-space: pre-wrap;
    }

    .error {
      color: #ef4444;
    }

    .success {
      color: #22c55e;
    }

    .small {
      font-size: 11px;
      color: #64748b;
      margin-top: 5px;
    }
  </style>
</head>

<body>
  <div class="card">
    <h2>Register OAuth Client</h2>

    <form id="form">
      <label>Client Name</label>
      <input type="text" id="name" placeholder="My App" required />

      <label>Redirect URIs</label>
      <textarea id="redirectUris" rows="3" placeholder="http://localhost:3000/callback" required></textarea>
      <div class="small">Comma separated multiple URIs allowed</div>

      <div class="row">
        <input type="checkbox" id="confidential" checked />
        <label>Confidential Client</label>
      </div>

      <button type="submit">Register Client</button>
    </form>

    <div id="result" class="result" style="display:none;"></div>
  </div>

  <script>
    const ISSUER = "https://oidc-auth-pfvc.onrender.com"
    const form = document.getElementById("form");
    const resultBox = document.getElementById("result");

    form.addEventListener("submit", async (e) => {
      e.preventDefault();

      const name = document.getElementById("name").value.trim();
      const redirectUris = document.getElementById("redirectUris").value
        .split(",")
        .map(x => x.trim())
        .filter(Boolean);

      const is_confidential = document.getElementById("confidential").checked;

      if (!name || redirectUris.length === 0) {
        showError("Name and redirect URI required");
        return;
      }

      try {
        const res = await fetch(`${ISSUER}/api/oauth/registration`, {
          method: "POST",
          headers: {
            "Content-Type": "application/json"
          },
          body: JSON.stringify({
            name,
            redirect_uris: redirectUris,
            is_confidential
          })
        });

        const data = await res.json();

        if (!res.ok) {
          throw new Error(data.message || "Registration failed");
        }

        showSuccess(data);

      } catch (err) {
        showError(err.message);
      }
    });

    function showSuccess(data) {
      resultBox.style.display = "block";
      resultBox.innerHTML = `
<span class="success">✔ Client Registered Successfully</span>

Client ID: ${data.client_id}
Client Secret: ${data.client_secret || "N/A"}
Client Name: ${data.name}
Redirect URIs: ${JSON.stringify(data.redirect_uris, null, 2)}
      `;
    }

    function showError(msg) {
      resultBox.style.display = "block";
      resultBox.innerHTML = `<span class="error">❌ ${msg}</span>`;
    }
  </script>
</body>
</html>
