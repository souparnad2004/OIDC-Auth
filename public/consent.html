<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Consent</title>

    <style>
      body {
        margin: 0;
        font-family: Arial, sans-serif;
        background: #0f172a;
        color: #e2e8f0;
        display: flex;
        justify-content: center;
        align-items: center;
        height: 100vh;
      }

      .card {
        width: 420px;
        background: #111827;
        padding: 24px;
        border-radius: 12px;
        box-shadow: 0 10px 30px rgba(0, 0, 0, 0.4);
      }

      h2 {
        margin-bottom: 8px;
        font-size: 22px;
      }

      .app {
        color: #60a5fa;
        font-weight: bold;
      }

      p {
        font-size: 14px;
        color: #cbd5e1;
        margin-bottom: 16px;
      }

      .scopes {
        background: #1f2937;
        padding: 12px;
        border-radius: 8px;
        margin-bottom: 20px;
      }

      .scopes li {
        margin: 6px 0;
        font-size: 14px;
      }

      .buttons {
        display: flex;
        justify-content: space-between;
        gap: 10px;
      }

      button {
        flex: 1;
        padding: 10px;
        border: none;
        border-radius: 8px;
        cursor: pointer;
        font-size: 14px;
        transition: 0.2s;
      }

      .allow {
        background: #22c55e;
        color: white;
      }

      .allow:hover {
        background: #16a34a;
      }

      .deny {
        background: #ef4444;
        color: white;
      }

      .deny:hover {
        background: #dc2626;
      }

      .footer {
        margin-top: 12px;
        font-size: 12px;
        color: #94a3b8;
        text-align: center;
      }
    </style>
  </head>

  <body>
    <div class="card">
      <h2><span class="app" id="clientName">Application</span> wants access</h2>

      <p>This app is requesting permission to access your account.</p>

      <div class="scopes">
        <strong>Requested permissions:</strong>
        <ul id="scopeList">
          <li>Loading...</li>
        </ul>
      </div>

      <form id="consentForm" method="POST" action="/api/oauth/consent">
        <input type="hidden" name="decision" id="decisionInput" />
        <input type="hidden" name="scope" id="scope" />
        <input type="hidden" name="client_id" id="client_id" />
        <input type="hidden" name="redirect_uri" id="redirect_uri" />
        <input type="hidden" name="state" id="state" />
        <div class="buttons">
          <button type="button" class="deny" onclick="submitConsent('deny')">
            Deny
          </button>

          <button type="button" class="allow" onclick="submitConsent('allow')">
            Allow
          </button>
        </div>
      </form>

      <div class="footer">
        You can revoke access anytime from your account settings.
      </div>
    </div>

    <script>
      // Example: dynamically set scopes from query params

      const params = new URLSearchParams(window.location.search);

      document.getElementById("scope").value = params.get("scope") || "";
      document.getElementById("client_id").value = params.get("client") || "";
      document.getElementById("redirect_uri").value =
        params.get("redirect_uri") || "";
      document.getElementById("state").value = params.get("state") || "";

      document.getElementById("clientName").innerText = client;

      const scopeList = document.getElementById("scopeList");
      scope.split(" ").forEach((s) => {
        const li = document.createElement("li");
        li.innerText = "• " + s;
        scopeList.appendChild(li);
      });

      function submitConsent(decision) {
        document.getElementById("decisionInput").value = decision;
        document.getElementById("consentForm").submit();
      }
    </script>
  </body>
</html>
